version: '3.9'

# Malaysia Secure Exchange Platform — Local Development Infrastructure
# All services use fixed credentials for local dev only.
# Never use these credentials in staging or production.

services:
  # ─────────────────────────────────────────────────────────
  # PostgreSQL 16 — primary relational store
  # ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: sep-postgres
    environment:
      POSTGRES_DB: sep_dev
      POSTGRES_USER: sep
      POSTGRES_PASSWORD: sep
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U sep -d sep_dev']
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - sep-net

  # ─────────────────────────────────────────────────────────
  # Redis 7 — queue, cache, rate limiting
  # AOF enabled for durability (BullMQ requirement)
  # ─────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: sep-redis
    command: redis-server --appendonly yes --appendfsync everysec
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - sep-net

  # ─────────────────────────────────────────────────────────
  # MinIO — S3-compatible object storage for payload artifacts
  # ─────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: sep-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000' # API
      - '9001:9001' # Console UI
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sep-net

  # Create default bucket on startup
  minio-init:
    image: minio/mc:latest
    container_name: sep-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/sep-payloads;
      mc mb --ignore-existing local/sep-audit-exports;
      mc anonymous set none local/sep-payloads;
      mc anonymous set none local/sep-audit-exports;
      echo 'MinIO buckets ready';
      "
    networks:
      - sep-net

  # ─────────────────────────────────────────────────────────
  # HashiCorp Vault — secret management / key custody
  # Dev mode only — data not persisted across restarts
  # Production uses a properly initialized Vault cluster
  # ─────────────────────────────────────────────────────────
  vault:
    image: hashicorp/vault:1.16
    container_name: sep-vault
    command: server -dev -dev-root-token-id=dev-root-token
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: dev-root-token
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    ports:
      - '8200:8200'
    cap_add:
      - IPC_LOCK
    healthcheck:
      test: ['CMD', 'vault', 'status']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sep-net

  # ─────────────────────────────────────────────────────────
  # Prometheus — metrics scraping
  # ─────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: sep-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    ports:
      - '9090:9090'
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - sep-net

  # ─────────────────────────────────────────────────────────
  # Grafana — dashboards
  # ─────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: sep-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: 'false'
    ports:
      - '3100:3000'
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - sep-net

volumes:
  postgres_data:
  redis_data:
  minio_data:
  prometheus_data:
  grafana_data:

networks:
  sep-net:
    driver: bridge
