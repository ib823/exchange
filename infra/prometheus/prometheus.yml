global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    platform: secure-exchange-platform
    env: dev

scrape_configs:
  - job_name: control-plane
    static_configs:
      - targets: ['host.docker.internal:9464']
    metrics_path: /metrics

  - job_name: data-plane
    static_configs:
      - targets: ['host.docker.internal:9465']
    metrics_path: /metrics

  - job_name: redis
    static_configs:
      - targets: ['host.docker.internal:9121']

  - job_name: postgres
    static_configs:
      - targets: ['host.docker.internal:9187']

  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
