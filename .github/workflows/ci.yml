name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'

jobs:
  # ─────────────────────────────────────────────────────────
  # Stage 1: Install and cache
  # ─────────────────────────────────────────────────────────
  install:
    name: Install dependencies
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile

  # ─────────────────────────────────────────────────────────
  # Stage 2: Lint and format check
  # ─────────────────────────────────────────────────────────
  lint:
    name: Lint
    permissions:
      contents: read
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm format:check

  # ─────────────────────────────────────────────────────────
  # Stage 3: Type checking
  # ─────────────────────────────────────────────────────────
  typecheck:
    name: Type check
    permissions:
      contents: read
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  # ─────────────────────────────────────────────────────────
  # Stage 4: Unit tests
  # ─────────────────────────────────────────────────────────
  unit-tests:
    name: Unit tests
    permissions:
      contents: read
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:unit
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-reports
          path: '**/coverage/**'

  # ─────────────────────────────────────────────────────────
  # Stage 5: Build
  # ─────────────────────────────────────────────────────────
  build:
    name: Build
    permissions:
      contents: read
    runs-on: ubuntu-latest
    needs: [lint, typecheck, unit-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            apps/*/dist
            packages/*/dist

  # ─────────────────────────────────────────────────────────
  # Stage 6: Contract tests
  # ─────────────────────────────────────────────────────────
  contract-tests:
    name: Contract tests
    permissions:
      contents: read
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v4
        with:
          name: build-artifacts
      - run: pnpm test:contract

  # ─────────────────────────────────────────────────────────
  # Stage 7: Integration tests (with real infra)
  # ─────────────────────────────────────────────────────────
  integration-tests:
    name: Integration tests
    permissions:
      contents: read
    runs-on: ubuntu-latest
    needs: build
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: sep_test
          POSTGRES_USER: sep
          POSTGRES_PASSWORD: sep
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://sep:sep@localhost:5432/sep_test
      RUNTIME_DATABASE_URL: postgresql://sep:sep@localhost:5432/sep_test
      REDIS_URL: redis://localhost:6379
      NODE_ENV: test
      APP_ENV: ci
      JWT_SECRET: ci-test-secret-minimum-32-characters-long
      REFRESH_TOKEN_SECRET: ci-refresh-secret-minimum-32-chars
      INTERNAL_SERVICE_TOKEN: ci-internal-token
      AUDIT_HASH_SECRET: ci-audit-hash-secret
      WEBHOOK_SIGNING_SECRET: ci-webhook-secret
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v4
        with:
          name: build-artifacts
      - name: Run DB migrations
        run: pnpm --filter @sep/db exec prisma migrate deploy
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
      - run: pnpm test:e2e

  # ─────────────────────────────────────────────────────────
  # Stage 8: Security scans
  # ─────────────────────────────────────────────────────────
  security:
    name: Security scan
    permissions:
      contents: read
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Dependency audit
        run: pnpm audit --audit-level=high
      - name: Secret scanning
        uses: trufflesecurity/trufflehog@580628bb9d5455140899afe2cb981ff5640bf399  # main as of remediation date
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD

  # ─────────────────────────────────────────────────────────
  # Stage 9: OpenAPI validation
  # ─────────────────────────────────────────────────────────
  openapi:
    name: OpenAPI validation
    permissions:
      contents: read
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v4
        with:
          name: build-artifacts
      - run: pnpm openapi:validate
