name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'

jobs:
  # ─────────────────────────────────────────────────────────
  # Stage 1: Install and cache
  # ─────────────────────────────────────────────────────────
  install:
    name: Install dependencies
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: pnpm/action-setup@a3252b78c470c02df07e9d59298aecedc3ccdd6d # v3.0.0
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile

  # ─────────────────────────────────────────────────────────
  # Stage 2: Lint and format check
  # ─────────────────────────────────────────────────────────
  lint:
    name: Lint
    permissions:
      contents: read
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: pnpm/action-setup@a3252b78c470c02df07e9d59298aecedc3ccdd6d # v3.0.0
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm format:check

  # ─────────────────────────────────────────────────────────
  # Stage 3: Type checking
  # ─────────────────────────────────────────────────────────
  typecheck:
    name: Type check
    permissions:
      contents: read
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: pnpm/action-setup@a3252b78c470c02df07e9d59298aecedc3ccdd6d # v3.0.0
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  # ─────────────────────────────────────────────────────────
  # Stage 4: Unit tests
  # ─────────────────────────────────────────────────────────
  unit-tests:
    name: Unit tests
    permissions:
      contents: read
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: pnpm/action-setup@a3252b78c470c02df07e9d59298aecedc3ccdd6d # v3.0.0
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:unit
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: coverage-reports
          path: '**/coverage/**'

  # ─────────────────────────────────────────────────────────
  # Stage 5: Build
  # ─────────────────────────────────────────────────────────
  build:
    name: Build
    permissions:
      contents: read
    runs-on: ubuntu-latest
    needs: [lint, typecheck, unit-tests]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: pnpm/action-setup@a3252b78c470c02df07e9d59298aecedc3ccdd6d # v3.0.0
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: build-artifacts
          path: |
            apps/*/dist
            packages/*/dist

  # ─────────────────────────────────────────────────────────
  # Stage 6: Contract tests
  # ─────────────────────────────────────────────────────────
  contract-tests:
    name: Contract tests
    permissions:
      contents: read
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: pnpm/action-setup@a3252b78c470c02df07e9d59298aecedc3ccdd6d # v3.0.0
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: build-artifacts
      - run: pnpm test:contract

  # ─────────────────────────────────────────────────────────
  # Stage 7: Integration tests (with real infra)
  # ─────────────────────────────────────────────────────────
  integration-tests:
    name: Integration tests
    permissions:
      contents: read
    runs-on: ubuntu-latest
    needs: build
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: sep_test
          POSTGRES_USER: sep
          POSTGRES_PASSWORD: sep
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://sep:sep@localhost:5432/sep_test
      RUNTIME_DATABASE_URL: postgresql://sep_app:sep_app@localhost:5432/sep_test
      REDIS_URL: redis://localhost:6379
      NODE_ENV: test
      APP_ENV: ci
      JWT_SECRET: ci-test-secret-minimum-32-characters-long
      REFRESH_TOKEN_SECRET: ci-refresh-secret-minimum-32-chars
      INTERNAL_SERVICE_TOKEN: ci-internal-token
      AUDIT_HASH_SECRET: ci-audit-hash-secret
      WEBHOOK_SIGNING_SECRET: ci-webhook-secret
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: pnpm/action-setup@a3252b78c470c02df07e9d59298aecedc3ccdd6d # v3.0.0
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: build-artifacts
      - name: Run DB migrations
        run: pnpm --filter @sep/db exec prisma migrate deploy
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
      - name: Verify runtime DB role separation
        run: |
          psql "$RUNTIME_DATABASE_URL" \
            -c "SELECT current_user, has_schema_privilege(current_user, 'public', 'CREATE') AS can_create_schema;"
      - run: pnpm test:e2e

  # ─────────────────────────────────────────────────────────
  # Stage 8: Security scans
  # ─────────────────────────────────────────────────────────
  security:
    name: Security scan
    permissions:
      contents: read
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: pnpm/action-setup@a3252b78c470c02df07e9d59298aecedc3ccdd6d # v3.0.0
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Set up Go (for osv-scanner)
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: '1.22'
      - name: Install osv-scanner
        # google/osv-scanner-action at tag v2.3.5 is a reusable workflow, not a
        # composite action — no action.yml at repo root. Invoking the CLI
        # directly via `go install` is simpler and keeps the pin readable.
        # Version-check: `go list -m -versions github.com/google/osv-scanner/v2`
        run: go install github.com/google/osv-scanner/v2/cmd/osv-scanner@v2.3.5
      - name: Run osv-scanner
        # Scan the single pnpm-lock.yaml at repo root — covers every
        # transitive dep across the workspace. `scan source` subcommand
        # doesn't accept --skip-git; --lockfile is the targeted scan.
        run: osv-scanner --lockfile=pnpm-lock.yaml
      - name: Secret scanning
        uses: trufflesecurity/trufflehog@580628bb9d5455140899afe2cb981ff5640bf399 # main as of remediation date
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD

  # OpenAPI validation job removed — was calling `swagger-cli` which was
  # deleted in M3.0 §4 against a non-existent `api/openapi.yaml`. Proper
  # generation + validation wiring tracked in issue #9 for M3.A9.

  # ─────────────────────────────────────────────────────────
  # Stage 10: SBOM (CycloneDX) — partial R5-003 closure
  # Signing + provenance attestation is deferred to M6.
  # ─────────────────────────────────────────────────────────
  sbom:
    name: Generate SBOM
    permissions:
      contents: read
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: pnpm/action-setup@a3252b78c470c02df07e9d59298aecedc3ccdd6d # v3.0.0
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Generate CycloneDX SBOM
        run: pnpm exec cyclonedx-npm --output-file sbom.cdx.json
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: sbom
          path: sbom.cdx.json
          retention-days: 90
